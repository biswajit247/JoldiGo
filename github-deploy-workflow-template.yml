name: Deploy JoldiGo Backend to DigitalOcean

on:
  push:
    branches:
      - main
    paths:
      - 'server/**'
      - 'Dockerfile'
      - '.github/workflows/deploy.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Deploy to Droplet via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            # Create deployment directory
            mkdir -p /var/www/joldigo-backend
            cd /var/www/joldigo-backend

            # Clone or pull latest repository updates
            if [ ! -d .git ]; then
              git clone https://github.com/biswajit247/JoldiGo.git .
            else
              git fetch --all
              git reset --hard origin/main
            fi

            # Build Docker container on the droplet
            docker build -t joldigo-backend:latest .
            
            # Stop existing backend container if running
            docker stop joldigo-backend-container || true
            docker rm joldigo-backend-container || true
            
            # Run new production container linking port 5001
            docker run -d \
              --name joldigo-backend-container \
              -p 5001:5001 \
              --restart always \
              --env-file .env \
              joldigo-backend:latest

            # Restart Nginx Reverse Proxy
            systemctl restart nginx

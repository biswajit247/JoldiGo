map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name api.joldigo.in;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name api.joldigo.in;

    # SSL Certificates managed by Let's Encrypt
    ssl_certificate /etc/letsencrypt/live/api.joldigo.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.joldigo.in/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 20M;

    location / {
        proxy_pass http://localhost:5001;
        proxy_http_version 1.1;
        
        # Enable WebSocket connection upgrading
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        
        # Standard reverse proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Extended timeouts to prevent WebSocket disconnects during active rides
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      window.onerror = function(message, source, lineno, colno, error) {
        var consoleEl = document.getElementById('debug-console');
        if (consoleEl) {
          consoleEl.style.display = 'block';
          consoleEl.innerText += "\n🚨 ERROR: " + message + "\nFile: " + source + "\nLine: " + lineno + ":" + colno + (error ? "\nStack: " + error.stack : "");
        }
        alert("🚨 App Crash Alert:\n" + message + "\nLine: " + lineno);
        return false;
      };
      window.addEventListener('unhandledrejection', function(event) {
        var consoleEl = document.getElementById('debug-console');
        if (consoleEl) {
          consoleEl.style.display = 'block';
          consoleEl.innerText += "\n🚨 REJECTION: " + event.reason;
        }
        alert("🚨 Promise Rejection:\n" + event.reason);
      });
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>JoldiGo | On-demand Rides in Kolkata</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <!-- Razorpay Checkout SDK -->
    <script defer src="https://checkout.razorpay.com/v1/checkout.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <audio id="webrtc-remote-audio" autoplay playsinline webkit-playsinline style="display: none;"></audio>
    <div id="debug-console" style="position: fixed; bottom: 0; left: 0; right: 0; max-height: 220px; overflow-y: auto; background: rgba(0,0,0,0.95); color: #ff3333; font-family: monospace; font-size: 11px; padding: 12px; z-index: 999999; border-top: 2px solid #ff3333; display: none; white-space: pre-wrap; word-break: break-all;"><b>[JoldiGo WebView Diagnostics Console]</b></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
